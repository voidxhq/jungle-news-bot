name: Jungle News Auto-Bot

on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser newspaper3k groq lxml_html_clean cloudinary

      - name: Run Jungle Bot
        env:
          JUNGLE_BOT_KEY: ${{ secrets.JUNGLE_BOT_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          KEY_NANA_AMA: ${{ secrets.KEY_NANA_AMA }}
          KEY_EMMANUEL: ${{ secrets.KEY_EMMANUEL }}
          KEY_SAMUEL: ${{ secrets.KEY_SAMUEL }}
          KEY_DESMOND: ${{ secrets.KEY_DESMOND }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          
        run: python jungle_bot.py
        
      - name: Save Memory to GitHub
        run: |
          git config --global user.name "Jungle-Bot"
          git config --global user.email "bot@junglenews.online"
          git add posted_urls.txt daily_tracker.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🧠 Bot updated its memory"
          git pull --rebase
          git push
